services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ev-backend

    ports:
      - "8000:8000"

    volumes:
      - ./models:/app/models
      - ./results:/app/results

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_NAME: evbattery
      DB_USER: postgres
      DB_PASSWORD: postgres

    restart: always

  frontend:

    build:
      context: ./frontend

    container_name: ev-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend

    restart: always

  postgres:
    image: postgres:15

    container_name: ev-postgres

    environment:
      POSTGRES_DB: evbattery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: